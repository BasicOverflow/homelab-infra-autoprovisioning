---
- name: Install required packages for Docker
  apt:
    name:
      - ca-certificates
      - curl
      - software-properties-common
    update_cache: yes
    state: present

- name: Remove existing Docker repositories
  shell: |
    rm -f /etc/apt/sources.list.d/docker*.list
    sed -i '/download.docker.com/d' /etc/apt/sources.list 2>/dev/null || true
  ignore_errors: true
  changed_when: false

- name: Create directory for Docker GPG keyring
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  shell: |
    mkdir -p /tmp/.gnupg && chmod 700 /tmp/.gnupg
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | GNUPGHOME=/tmp/.gnupg gpg --dearmor --batch --yes --no-tty --no-default-keyring --keyring /dev/null -o /etc/apt/keyrings/docker.gpg && chmod 644 /etc/apt/keyrings/docker.gpg
  ignore_errors: true

- name: Add Docker APT repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
  ignore_errors: true

- name: Install Docker
  apt:
    name: docker-ce
    state: present

- name: Start Docker service
  service:
    name: docker
    state: started
    enabled: yes

- name: Install Docker Compose and add user to docker group
  block:
    - name: Install Docker Compose
      get_url:
        url: https://github.com/docker/compose/releases/download/1.29.2/docker-compose-Linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: 'a+x'
    
    - name: Add user to the docker group
      user:
        name: "{{ ci_user }}"
        groups: docker
        append: yes
    
    - name: Create symlink for Docker Compose
      file:
        src: /usr/local/bin/docker-compose
        dest: /usr/bin/docker-compose
        state: link

- name: Check Docker version
  command: docker --version
  register: docker_version
  ignore_errors: true
  changed_when: false

- name: Check Docker service status
  command: systemctl is-active docker
  register: docker_service
  ignore_errors: true
  changed_when: false

- name: Test Docker installation
  command: docker run --rm hello-world
  register: docker_test
  ignore_errors: true
  changed_when: false

- name: Test Docker Compose
  command: docker compose version
  register: compose_test
  ignore_errors: true
  changed_when: false

- name: Verify Docker and Compose
  debug:
    msg:
      - "Docker version: {{ docker_version.stdout if docker_version.rc == 0 else 'NOT AVAILABLE' }}"
      - "Docker service: {{ 'RUNNING' if docker_service.rc == 0 else 'NOT RUNNING' }}"
      - "Docker test: {{ 'OK' if docker_test.rc == 0 else 'FAILED' }}"
      - "Docker Compose: {{ 'OK' if compose_test.rc == 0 else 'FAILED' }}"
