[defaults]
host_key_checking = False
remote_tmp = /tmp/.ansible-${USER}
forks = 10

[ssh_connection]
ssh_args = -o PreferredAuthentications=password -o PubkeyAuthentication=no -o PasswordAuthentication=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=no -o ControlPath=none
pipelining = False
control_path_dir = /tmp/.ansible-ssh-control
